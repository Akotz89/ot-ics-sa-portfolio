<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SA Whiteboard Diagrams</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #f0f2f5; padding: 40px; }
  .diagram-page {
    background: #fff; width: 1100px; margin: 0 auto 60px;
    border-radius: 8px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);
    padding: 48px; page-break-after: always;
  }
  .diagram-title {
    font-size: 20px; font-weight: 700; color: #1a2332;
    text-align: center; margin-bottom: 4px;
  }
  .diagram-subtitle {
    font-size: 11px; color: #718096; text-align: center;
    letter-spacing: 0.5px; margin-bottom: 32px;
  }
  @media print {
    body { background: #fff; padding: 0; }
    .diagram-page { box-shadow: none; border-radius: 0; width: 100%; }
  }
</style>
</head>
<body>

<!-- DIAGRAM 1: Purdue Model Deployment Whiteboard -->
<div class="diagram-page">
  <div class="diagram-title">Federal OT Network — Dragos Sensor Deployment</div>
  <div class="diagram-subtitle">Based on ISA-99 / IEC 62443 Purdue Reference Architecture</div>
  <svg viewBox="0 0 1000 680" xmlns="http://www.w3.org/2000/svg" style="width:100%">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#4299e1"/>
      </marker>
      <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#e53e3e"/>
      </marker>
      <filter id="shadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
    </defs>

    <!-- Level 5: Enterprise -->
    <rect x="40" y="10" width="920" height="70" rx="6" fill="#edf2f7" stroke="#cbd5e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="35" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">LEVEL 5 · ENTERPRISE NETWORK</text>
    <rect x="80" y="45" width="100" height="28" rx="4" fill="#fff" stroke="#cbd5e0"/>
    <text x="130" y="63" font-size="9" fill="#4a5568" text-anchor="middle">Email / DNS</text>
    <rect x="200" y="45" width="100" height="28" rx="4" fill="#fff" stroke="#cbd5e0"/>
    <text x="250" y="63" font-size="9" fill="#4a5568" text-anchor="middle">Active Directory</text>
    <rect x="320" y="45" width="100" height="28" rx="4" fill="#fff" stroke="#cbd5e0"/>
    <text x="370" y="63" font-size="9" fill="#4a5568" text-anchor="middle">SIEM / Splunk</text>
    <!-- CentralStore at L5 -->
    <rect x="700" y="38" width="240" height="36" rx="6" fill="#1a365d" stroke="#2c5282" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="61" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">⬢ Dragos CentralStore</text>

    <!-- Level 4: Business Planning -->
    <rect x="40" y="95" width="920" height="70" rx="6" fill="#f7fafc" stroke="#cbd5e0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="120" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">LEVEL 4 · BUSINESS PLANNING</text>
    <rect x="80" y="130" width="100" height="28" rx="4" fill="#fff" stroke="#cbd5e0"/>
    <text x="130" y="148" font-size="9" fill="#4a5568" text-anchor="middle">ERP System</text>
    <rect x="200" y="130" width="130" height="28" rx="4" fill="#fff" stroke="#cbd5e0"/>
    <text x="265" y="148" font-size="9" fill="#4a5568" text-anchor="middle">Supply Chain Mgmt</text>

    <!-- DMZ - Red dashed boundary -->
    <rect x="40" y="180" width="920" height="50" rx="6" fill="#fff5f5" stroke="#e53e3e" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
    <text x="60" y="205" font-size="10" font-weight="700" fill="#e53e3e" letter-spacing="1">LEVEL 3.5 · INDUSTRIAL DMZ</text>
    <rect x="350" y="192" width="80" height="28" rx="4" fill="#fff" stroke="#e53e3e"/>
    <text x="390" y="210" font-size="9" fill="#c53030" text-anchor="middle">Firewall</text>
    <rect x="460" y="192" width="120" height="28" rx="4" fill="#fff" stroke="#e53e3e"/>
    <text x="520" y="210" font-size="9" fill="#c53030" text-anchor="middle">Jump Server / VPN</text>
    <rect x="610" y="192" width="100" height="28" rx="4" fill="#fff" stroke="#e53e3e"/>
    <text x="660" y="210" font-size="9" fill="#c53030" text-anchor="middle">Data Diode</text>

    <!-- Level 3: Site Operations -->
    <rect x="40" y="245" width="920" height="85" rx="6" fill="#ebf8ff" stroke="#90cdf4" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="270" font-size="10" font-weight="700" fill="#2b6cb0" letter-spacing="1">LEVEL 3 · SITE OPERATIONS</text>
    <rect x="80" y="282" width="110" height="28" rx="4" fill="#fff" stroke="#90cdf4"/>
    <text x="135" y="300" font-size="9" fill="#2c5282" text-anchor="middle">Historian Server</text>
    <rect x="210" y="282" width="130" height="28" rx="4" fill="#fff" stroke="#90cdf4"/>
    <text x="275" y="300" font-size="9" fill="#2c5282" text-anchor="middle">Eng. Workstation</text>
    <rect x="360" y="282" width="100" height="28" rx="4" fill="#fff" stroke="#90cdf4"/>
    <text x="410" y="300" font-size="9" fill="#2c5282" text-anchor="middle">Patch Server</text>
    <!-- SiteStore at L3 -->
    <rect x="700" y="268" width="240" height="50" rx="6" fill="#2b6cb0" stroke="#2c5282" stroke-width="2" filter="url(#shadow)"/>
    <text x="820" y="289" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">⬢ Dragos SiteStore</text>
    <text x="820" y="306" font-size="8" fill="#bee3f8" text-anchor="middle">Analysis · Detection · Asset Inventory</text>

    <!-- Sensor at L3 monitoring point -->
    <rect x="520" y="278" width="140" height="36" rx="6" fill="#f6ad55" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
    <text x="590" y="301" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">◉ Sensor (SPAN)</text>
    <!-- Arrow: Sensor → SiteStore -->
    <line x1="660" y1="296" x2="698" y2="293" stroke="#4299e1" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Level 2: Supervisory Control -->
    <rect x="40" y="345" width="920" height="85" rx="6" fill="#f0fff4" stroke="#9ae6b4" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="370" font-size="10" font-weight="700" fill="#276749" letter-spacing="1">LEVEL 2 · SUPERVISORY CONTROL</text>
    <rect x="80" y="382" width="100" height="28" rx="4" fill="#fff" stroke="#9ae6b4"/>
    <text x="130" y="400" font-size="9" fill="#276749" text-anchor="middle">SCADA Server</text>
    <rect x="200" y="382" width="80" height="28" rx="4" fill="#fff" stroke="#9ae6b4"/>
    <text x="240" y="400" font-size="9" fill="#276749" text-anchor="middle">HMI #1</text>
    <rect x="300" y="382" width="80" height="28" rx="4" fill="#fff" stroke="#9ae6b4"/>
    <text x="340" y="400" font-size="9" fill="#276749" text-anchor="middle">HMI #2</text>

    <!-- Sensor at L2 monitoring point -->
    <rect x="520" y="378" width="140" height="36" rx="6" fill="#f6ad55" stroke="#dd6b20" stroke-width="2" filter="url(#shadow)"/>
    <text x="590" y="401" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">◉ Sensor (TAP)</text>
    <!-- Arrow: Sensor → SiteStore -->
    <line x1="660" y1="396" x2="820" y2="320" stroke="#4299e1" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>

    <!-- Level 1: Basic Control -->
    <rect x="40" y="445" width="920" height="85" rx="6" fill="#fffff0" stroke="#fefcbf" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="470" font-size="10" font-weight="700" fill="#975a16" letter-spacing="1">LEVEL 1 · BASIC CONTROL</text>
    <rect x="80" y="482" width="80" height="28" rx="4" fill="#fff" stroke="#fefcbf"/>
    <text x="120" y="500" font-size="9" fill="#975a16" text-anchor="middle">PLC #1</text>
    <rect x="180" y="482" width="80" height="28" rx="4" fill="#fff" stroke="#fefcbf"/>
    <text x="220" y="500" font-size="9" fill="#975a16" text-anchor="middle">PLC #2</text>
    <rect x="280" y="482" width="80" height="28" rx="4" fill="#fff" stroke="#fefcbf"/>
    <text x="320" y="500" font-size="9" fill="#975a16" text-anchor="middle">RTU</text>
    <rect x="380" y="482" width="120" height="28" rx="4" fill="#fff" stroke="#fefcbf"/>
    <text x="440" y="500" font-size="9" fill="#975a16" text-anchor="middle">DCS Controller</text>
    <rect x="520" y="482" width="80" height="28" rx="4" fill="#fff" stroke="#fefcbf"/>
    <text x="560" y="500" font-size="9" fill="#975a16" text-anchor="middle">SIS</text>

    <!-- Level 0: Physical Process -->
    <rect x="40" y="545" width="920" height="55" rx="6" fill="#f7fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="60" y="570" font-size="10" font-weight="700" fill="#718096" letter-spacing="1">LEVEL 0 · PHYSICAL PROCESS</text>
    <text x="80" y="588" font-size="9" fill="#a0aec0">Valves · Pumps · Motors · Actuators · Sensors · Transmitters</text>

    <!-- Data flow: SiteStore → CentralStore -->
    <line x1="820" y1="268" x2="820" y2="78" stroke="#4299e1" stroke-width="2.5" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
    <text x="832" y="180" font-size="8" fill="#4299e1" transform="rotate(-90,832,180)">Encrypted Metadata</text>

    <!-- Syslog arrow to SIEM -->
    <line x1="700" y1="50" x2="422" y2="59" stroke="#718096" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
    <text x="560" y="48" font-size="8" fill="#718096">Syslog Forwarding</text>

    <!-- Legend -->
    <rect x="40" y="620" width="920" height="50" rx="4" fill="#f7fafc" stroke="#e2e8f0"/>
    <rect x="60" y="635" width="16" height="16" rx="3" fill="#f6ad55" stroke="#dd6b20"/>
    <text x="82" y="648" font-size="9" fill="#4a5568">Dragos Sensor (passive SPAN/TAP)</text>
    <rect x="280" y="635" width="16" height="16" rx="3" fill="#1a365d" stroke="#2c5282"/>
    <text x="302" y="648" font-size="9" fill="#4a5568">Dragos Platform Component</text>
    <line x1="500" y1="643" x2="540" y2="643" stroke="#4299e1" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="546" y="648" font-size="9" fill="#4a5568">Metadata Flow</text>
    <rect x="680" y="635" width="16" height="16" rx="3" fill="#fff5f5" stroke="#e53e3e" stroke-dasharray="4,2"/>
    <text x="702" y="648" font-size="9" fill="#4a5568">DMZ Boundary</text>
  </svg>
</div>

<!-- DIAGRAM 2: 3-Tier Platform Architecture -->
<div class="diagram-page">
  <div class="diagram-title">Dragos Platform — 3-Tier Architecture</div>
  <div class="diagram-subtitle">Based on Dragos Platform deployment documentation · dragos.com</div>
  <svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" style="width:100%">
    <defs>
      <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b6cb0"/>
      </marker>
      <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f6ad55"/><stop offset="100%" stop-color="#ed8936"/></linearGradient>
      <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4299e1"/><stop offset="100%" stop-color="#2b6cb0"/></linearGradient>
      <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a365d"/><stop offset="100%" stop-color="#0d1b2a"/></linearGradient>
      <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    </defs>

    <!-- Sensors row -->
    <rect x="50" y="30" width="180" height="130" rx="10" fill="url(#g1)" filter="url(#s2)"/>
    <text x="140" y="65" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">◉ Sensors</text>
    <text x="140" y="85" font-size="9" fill="#fffaf0" text-anchor="middle">Passive SPAN / TAP</text>
    <line x1="70" y1="100" x2="210" y2="100" stroke="#fff" stroke-opacity="0.3"/>
    <text x="140" y="118" font-size="8.5" fill="#fffaf0" text-anchor="middle">600+ Protocol Parsers</text>
    <text x="140" y="133" font-size="8.5" fill="#fffaf0" text-anchor="middle">Deep Packet Inspection</text>
    <text x="140" y="148" font-size="8.5" fill="#fffaf0" text-anchor="middle">Asset Discovery</text>

    <!-- Multiple sensor instances -->
    <rect x="50" y="180" width="55" height="30" rx="4" fill="#fff" stroke="#dd6b20" stroke-width="1.5"/>
    <text x="78" y="199" font-size="8" fill="#975a16" text-anchor="middle">Site A</text>
    <rect x="113" y="180" width="55" height="30" rx="4" fill="#fff" stroke="#dd6b20" stroke-width="1.5"/>
    <text x="140" y="199" font-size="8" fill="#975a16" text-anchor="middle">Site B</text>
    <rect x="175" y="180" width="55" height="30" rx="4" fill="#fff" stroke="#dd6b20" stroke-width="1.5"/>
    <text x="203" y="199" font-size="8" fill="#975a16" text-anchor="middle">Site C</text>

    <!-- Arrow: Sensors → SiteStore -->
    <line x1="232" y1="95" x2="368" y2="95" stroke="#2b6cb0" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="300" y="85" font-size="8" fill="#2b6cb0" text-anchor="middle">Encrypted</text>
    <text x="300" y="110" font-size="8" fill="#2b6cb0" text-anchor="middle">Metadata</text>

    <!-- SiteStore -->
    <rect x="370" y="30" width="240" height="130" rx="10" fill="url(#g2)" filter="url(#s2)"/>
    <text x="490" y="65" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">⬢ SiteStore</text>
    <text x="490" y="85" font-size="9" fill="#ebf8ff" text-anchor="middle">Site-Level Management</text>
    <line x1="390" y1="100" x2="590" y2="100" stroke="#fff" stroke-opacity="0.3"/>
    <text x="490" y="118" font-size="8.5" fill="#ebf8ff" text-anchor="middle">Threat Detection Engine</text>
    <text x="490" y="133" font-size="8.5" fill="#ebf8ff" text-anchor="middle">Vulnerability Management</text>
    <text x="490" y="148" font-size="8.5" fill="#ebf8ff" text-anchor="middle">Investigation &amp; Response</text>

    <!-- Arrow: SiteStore → CentralStore -->
    <line x1="612" y1="95" x2="748" y2="95" stroke="#2b6cb0" stroke-width="2.5" marker-end="url(#arr2)"/>
    <text x="680" y="85" font-size="8" fill="#2b6cb0" text-anchor="middle">Aggregated</text>
    <text x="680" y="110" font-size="8" fill="#2b6cb0" text-anchor="middle">Analytics</text>

    <!-- CentralStore -->
    <rect x="750" y="30" width="220" height="130" rx="10" fill="url(#g3)" filter="url(#s2)"/>
    <text x="860" y="65" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">⬢ CentralStore</text>
    <text x="860" y="85" font-size="9" fill="#bee3f8" text-anchor="middle">Enterprise Aggregation</text>
    <line x1="770" y1="100" x2="950" y2="100" stroke="#fff" stroke-opacity="0.3"/>
    <text x="860" y="118" font-size="8.5" fill="#bee3f8" text-anchor="middle">Multi-Site Dashboards</text>
    <text x="860" y="133" font-size="8.5" fill="#bee3f8" text-anchor="middle">Cross-Site Correlation</text>
    <text x="860" y="148" font-size="8.5" fill="#bee3f8" text-anchor="middle">Executive Reporting</text>

    <!-- Four Pillars row -->
    <text x="500" y="260" font-size="13" font-weight="700" fill="#1a365d" text-anchor="middle">Platform Capabilities — Four Pillars</text>
    <rect x="50" y="280" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s2)"/>
    <rect x="50" y="280" width="210" height="6" rx="8" fill="#f6ad55"/>
    <text x="155" y="310" font-size="11" font-weight="700" fill="#1a365d" text-anchor="middle">Asset Visibility</text>
    <text x="155" y="328" font-size="8.5" fill="#718096" text-anchor="middle">Passive OT asset discovery</text>
    <text x="155" y="343" font-size="8.5" fill="#718096" text-anchor="middle">Make · Model · Firmware · Comms</text>
    <text x="155" y="358" font-size="7.5" fill="#4299e1" text-anchor="middle">▸ CISA BOD 23-01 compliance</text>

    <rect x="280" y="280" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s2)"/>
    <rect x="280" y="280" width="210" height="6" rx="8" fill="#48bb78"/>
    <text x="385" y="310" font-size="11" font-weight="700" fill="#1a365d" text-anchor="middle">Vulnerability Mgmt</text>
    <text x="385" y="328" font-size="8.5" fill="#718096" text-anchor="middle">Now / Next / Never prioritization</text>
    <text x="385" y="343" font-size="8.5" fill="#718096" text-anchor="middle">OT-corrected CVSS scoring</text>
    <text x="385" y="358" font-size="7.5" fill="#4299e1" text-anchor="middle">▸ Complements ACAS for OT</text>

    <rect x="510" y="280" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s2)"/>
    <rect x="510" y="280" width="210" height="6" rx="8" fill="#4299e1"/>
    <text x="615" y="310" font-size="11" font-weight="700" fill="#1a365d" text-anchor="middle">Threat Detection</text>
    <text x="615" y="328" font-size="8.5" fill="#718096" text-anchor="middle">Behavioral + signature analytics</text>
    <text x="615" y="343" font-size="8.5" fill="#718096" text-anchor="middle">OT protocol-aware alerting</text>
    <text x="615" y="358" font-size="7.5" fill="#4299e1" text-anchor="middle">▸ ICS Kill Chain Stage 1 &amp; 2</text>

    <rect x="740" y="280" width="210" height="90" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#s2)"/>
    <rect x="740" y="280" width="210" height="6" rx="8" fill="#e53e3e"/>
    <text x="845" y="310" font-size="11" font-weight="700" fill="#1a365d" text-anchor="middle">Investigation</text>
    <text x="845" y="328" font-size="8.5" fill="#718096" text-anchor="middle">PCAP replay &amp; forensics</text>
    <text x="845" y="343" font-size="8.5" fill="#718096" text-anchor="middle">Timeline reconstruction</text>
    <text x="845" y="358" font-size="7.5" fill="#4299e1" text-anchor="middle">▸ CIRCIA reporting support</text>

    <!-- Integration row -->
    <text x="500" y="420" font-size="13" font-weight="700" fill="#1a365d" text-anchor="middle">Ecosystem Integration</text>
    <rect x="100" y="435" width="160" height="40" rx="6" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="180" y="460" font-size="10" fill="#4a5568" text-anchor="middle">WorldView Intel</text>
    <rect x="290" y="435" width="160" height="40" rx="6" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="370" y="460" font-size="10" fill="#4a5568" text-anchor="middle">Neighborhood Keeper</text>
    <rect x="480" y="435" width="160" height="40" rx="6" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="560" y="460" font-size="10" fill="#4a5568" text-anchor="middle">OT Watch / Complete</text>
    <rect x="670" y="435" width="160" height="40" rx="6" fill="#f7fafc" stroke="#cbd5e0"/>
    <text x="750" y="460" font-size="10" fill="#4a5568" text-anchor="middle">SIEM / SOC Integration</text>
  </svg>
</div>

</body>
</html>
