<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Whiteboard — Federal OT Network Design</title>
<link rel="stylesheet" href="../nav.css">
<link rel="stylesheet" href="whiteboard.css">
</head>
<body>

<header class="wb-header">
  <div>
    <p class="eyebrow">Interactive SA whiteboard</p>
    <h1>Federal OT Network Discovery and Dragos Placement</h1>
  </div>
  <div class="step-controls">
    <button class="step-btn" id="btn-reset">Reset</button>
    <button class="step-btn" id="btn-prev" disabled>Back</button>
    <span class="step-indicator">Ready</span>
    <button class="step-btn primary" id="btn-next">Next</button>
  </div>
</header>

<section class="narration" aria-live="polite">
  <p>Press <strong>Next</strong> or <strong>spacebar</strong> to begin the customer whiteboard walkthrough.</p>
</section>

<main class="wb-stage">
  <div id="diagram-frame" class="diagram-frame">
    <div id="diagram" class="diagram" aria-label="Federal OT network diagram">
      <svg id="flow-layer" class="flow-layer" width="1320" height="720" viewBox="0 0 1320 720" aria-hidden="true">
        <defs>
          <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0 0L10 5L0 10z" fill="#586a7f"/>
          </marker>
          <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0 0L10 5L0 10z" fill="#1f65a6"/>
          </marker>
          <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0 0L10 5L0 10z" fill="#c96a16"/>
          </marker>
        </defs>
      </svg>
      <div id="enclave-layer" class="enclave-layer"></div>
      <div id="node-layer" class="node-layer"></div>
      <div id="flow-label-layer" class="flow-label-layer"></div>
      <div id="annotation-layer" class="annotation-layer"></div>
    </div>
  </div>
</main>

<script type="module" src="whiteboard.js?v=wide-fill-1"></script>
<script src="../nav.js"></script>
</body>
</html>
